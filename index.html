<!doctype html>
<head>
    <link rel="stylesheet" href="styles.css" />
    <script src="data-manager.js" type="module"></script>
</head>
<body>
    <div class="sidebar">
        <div>
            <div>
                <h2>Kategorien</h2>
            </div>
            <div id="category-container"></div>

            <template id="category-template">
                <div class="category">
                    <h3 id="label"></h3>
                </div>
            </template>
        </div>
        <div>
            <div>
                <h2>Filter</h2>
            </div>
            <div>
                <input type="text" hidden></input>

                <ul id="filter-container"></ul>

                <template id="filter-template">
                    <div class="filter-option">
                        <div></div>
                        <input type="checkbox">
                    </div>
                </template>
            </div>
        </div>
    </div>
    <div id="main">
        <div id="main-content-list"></div>

        <template id="main-content-entry">
            <div class="entry">
                <div>
                    <img>
                </div>
                <div>
                    <h2 id="label"></h2>

                    <h4 id="length"></h4>
                </div>
            </div>
        </template>
    </div>
</body>
<footer></footer>
